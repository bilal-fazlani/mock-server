[project]
site_name = "Mock Server"
site_description = "How to create and configure mock endpoints in the mock server."
# Required for instant navigation, the sitemap, and canonical URLs.
site_url = "https://mock-server.bilal-fazlani.com"
repo_url = "https://github.com/bilal-fazlani/mock-server"
repo_name = "bilal-fazlani/mock-server"

nav = [
  { "Overview" = "index.md" },
  { "Get started" = [
    { "Install & run" = "get-started/install.md" },
    { "Your first mock endpoint" = "get-started/first-mock.md" },
  ] },
  { "Building mocks" = [
    { "Endpoints" = "building/endpoints.md" },
    { "Profiles" = "building/profiles.md" },
    { "Scenarios" = "building/scenarios.md" },
    { "Code-backed resolvers" = "building/dynamic.md" },
    { "Fixtures" = "building/fixtures.md" },
    { "Schemas" = "building/schemas.md" },
  ] },
  { "Driving mocks" = [
    { "Runtime-control API" = "driving/api.md" },
    { "Using it in dev & CI" = "driving/dev-and-ci.md" },
    { "Request logs" = "driving/request-logs.md" },
  ] },
  { "Reference" = [
    { "Configuration" = "reference/configuration.md" },
    { "Request lifecycle" = "reference/request-lifecycle.md" },
    { "Gotchas" = "reference/gotchas.md" },
  ] },
]

[project.theme]
features = [
  "navigation.sections",          # top-level sections as sidebar groups
  "navigation.footer",            # prev/next links in the footer
  "navigation.top",               # back-to-top button
  "content.code.select",          # line-selection button on code blocks
  "navigation.instant",           # SPA-style instant page loading (needs site_url)
  "navigation.instant.prefetch",  # prefetch links on hover
  "navigation.instant.progress",  # loading progress bar for slower loads
]

# Light + dark, with a toggle in the header (defaults to the reader's OS setting).
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

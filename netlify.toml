# Netlify build config for the Zensical docs site.
# Docs project lives in docs/site/; Netlify installs Python deps and runs the
# build from there (the "base" directory).
[build]
  base = "docs/site"
  # A Pipfile in the base directory makes Netlify run `pipenv install`
  # automatically; the installed console scripts (zensical) land on PATH, so the
  # build command needs no `pipenv run` prefix.
  command = "zensical build"
  # Relative to `base`: Zensical writes its static output to docs/site/site.
  publish = "site"
  # Skip the build unless something under docs/site/ actually changed, so
  # code-only branches and PRs don't trigger a full docs rebuild + deploy
  # preview. Netlify cancels the build when this command exits 0 (no diff) and
  # proceeds on a non-zero exit (diff present). $CACHED_COMMIT_REF/$COMMIT_REF
  # are the last-built and current commits; ':/docs/site' is a repo-root-relative
  # pathspec, so it holds regardless of the command's working directory.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ':/docs/site'"

[build.environment]
  # Pin the interpreter so builds are reproducible (Pipfile requires the same).
  PYTHON_VERSION = "3.14"

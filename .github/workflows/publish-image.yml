name: Publish container image

# Build and publish images only for releases (keeps CI minutes down):
#   - Publish a GitHub Release "v1.2.0" -> tag, notes, and a semver-tagged
#     image (1.2.0, 1.2, 1, latest) are produced together.
#   - Manual runs are supported for re-publishing a release: dispatch this
#     workflow against a tag ref (v*) so the semver tags resolve.
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GitHub Packages (ghcr.io)
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Derive image tags/labels from the triggering ref:
      # a release/tag v1.2.0 -> 1.2.0, 1.2, 1, latest.
      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      # QEMU + Buildx enable the linux/arm64 build on an amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

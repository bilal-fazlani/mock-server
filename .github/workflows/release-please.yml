name: Release Please

# Maintains a "release PR" that bumps the version and changelog from Conventional
# Commits on main. Merging that PR creates the git tag + GitHub Release, which in
# turn triggers publish-npm.yml and publish-image.yml.
#
# IMPORTANT: release-please must run with a Personal Access Token (RELEASE_PLEASE_TOKEN),
# NOT the default GITHUB_TOKEN. A Release created via GITHUB_TOKEN does not trigger other
# workflows (GitHub blocks GITHUB_TOKEN-initiated events from starting new runs), so the
# publish workflows would never fire. A PAT-created Release fires `release: published`
# normally. See RELEASE.md.
on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
